<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css">
    <title>Login UI</title>
</head>

<body>

    <div class="page">
        <div class="login-card">

            <div class="logo">
                <i class="ri-box-3-line"></i>
            </div>

            <h2>Sign in</h2>
            <p class="subtitle">Enter your email and password below to sign in</p>

            <form>
                <label>Email:</label>
                <input type="email" placeholder="JohnDoe99@gmail.com">
                <label>Password:</label>
                <input type="password" placeholder="Enter password">
                <button class="signin-btn">Sign in</button>
            </form>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <button class="socials"> <span><i class="ri-apple-fill"></i></span>Continue with Apple </button>
            <button class="socials"><span><i class="ri-google-fill"></i></span>Continue with Google </button>
            <button class="socials">Single Sign-on (SSO)</button>

            <p class="signup">
                Don't Have an Account? <a href="#">Sign up</a>
            </p>

        </div>
    </div>
</body>

</html>
